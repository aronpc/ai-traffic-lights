<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Preferências — AI Traffic Lights</title>
  <style>
    :root {
      --bg: #1a1d24; --panel: #22262f; --ink: #f4f6f9; --dim: #a8b2be;
      --accent: #3fb96b; --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--ink); font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      padding: 20px; font-size: 13.5px; -webkit-user-select: none;
    }
    h1 { font-size: 14px; font-weight: 700; margin-bottom: 18px; letter-spacing: 0.3px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; color: var(--dim); font-size: 11.5px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    select, .shortcut {
      width: 100%; background: var(--panel); color: var(--ink); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 11px; font-size: 13px; outline: none;
    }
    select:focus, .shortcut.capturing { border-color: var(--accent); }
    .shortcut { cursor: pointer; font-variant-numeric: tabular-nums; }
    .shortcut.capturing { color: var(--dim); font-style: italic; }
    .hint { color: var(--dim); font-size: 11px; margin-top: 5px; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }
    button {
      background: var(--panel); color: var(--ink); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600;
    }
    button:hover { background: rgba(255,255,255,0.07); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #0d1f14; }
    button.primary:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <h1>🚦 Preferências</h1>

  <div class="field">
    <label for="idle">Tempo parado até virar vermelho (idle)</label>
    <select id="idle">
      <option value="60">1 minuto</option>
      <option value="120">2 minutos</option>
      <option value="300">5 minutos (padrão)</option>
      <option value="600">10 minutos</option>
      <option value="900">15 minutos</option>
      <option value="never">Nunca (sempre verde quando pronto)</option>
    </select>
    <div class="hint">Uma sessão que terminou e ficou parada por mais que isso vira 🔴.</div>
  </div>

  <div class="field">
    <label for="shortcut">Atalho de mostrar/ocultar</label>
    <div class="shortcut" id="shortcut" tabindex="0">—</div>
    <div class="hint">Clique e pressione a combinação. Precisa de um modificador (Ctrl/Alt/Shift/Super).</div>
  </div>

  <div class="actions">
    <button id="cancel">Cancelar</button>
    <button id="save" class="primary">Salvar</button>
  </div>

  <script src="settings-renderer.js"></script>
</body>
</html>
